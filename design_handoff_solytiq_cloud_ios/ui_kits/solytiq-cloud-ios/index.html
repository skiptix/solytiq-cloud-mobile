  rounded: { r:18, sm:10, lg:24 },
  bubbly:  { r:28, sm:18, lg:36 },
};
const DENSITIES = {
  compact: { rowPad:'8px',  cardPad:'10px' },
  regular: { rowPad:'11px', cardPad:'14px' },
  airy:    { rowPad:'16px', cardPad:'18px' },
};

      root.style.setProperty('--sc-primary',      t.palette[0]);
      root.style.setProperty('--sc-primary-soft', t.palette[1]);
      root.style.setProperty('--sc-primary-bg',   t.palette[2]);
      root.style.setProperty('--sc-primary-bg-2', t.palette[3] || t.palette[2]);
      root.style.setProperty('--sc-page',         t.palette[4] || '#fdf8ff');

    const s = SHAPES[t.shape] || SHAPES.rounded;
    root.style.setProperty('--sc-r',    s.r  + 'px');
    root.style.setProperty('--sc-r-sm', s.sm + 'px');
    root.style.setProperty('--sc-r-lg', s.lg + 'px');
    const d = DENSITIES[t.density] || DENSITIES.regular;

  const updateTask = useCallback((id, upd) => {
    setTasks(prev => prev.map(t => t.id===id ? {...t,...upd} : t));
    setLists(prev => prev.map(l => ({...l, sections:l.sections.map(s => ({...s, tasks:s.tasks.map(t => t.id===id ? {...t,...upd} : t)}))})));
  }, []);

  const deleteTask = useCallback(id => {
    setTasks(prev => prev.filter(t => t.id!==id));
    setLists(prev => prev.map(l => ({...l, sections:l.sections.map(s => ({...s, tasks:s.tasks.filter(t => t.id!==id)}))})));
  }, []);

  const addTask = useCallback(payload => {
    const newId = taskCounter + 1;
    setTaskCounter(c => c+1);
    const t = { id:newId, checked:false, ...payload };
    if (payload._listId && payload._sectionId) {
      setLists(prev => prev.map(l => l.id!==payload._listId ? l : {
        ...l, sections: l.sections.map(s => s.id!==payload._sectionId ? s : {...s, tasks:[...s.tasks, t]})
      }));
    } else {
      setTasks(prev => [t, ...prev]);
    }
  }, [taskCounter]);

  const findTaskById = useCallback(id => {
    const dt = tasks.find(t => t.id===id);
    if (dt) return { task:dt, source:'dash', listName:'Dashboard' };
    for (const l of lists) for (const sec of l.sections) {
      const t = sec.tasks.find(x => x.id===id);
      if (t) return { task:t, source:'list', listId:l.id, listName:l.name, sectionId:sec.id };
    }
    return null;
  }, [tasks, lists]);

  const addAIMessage = useCallback(msg => setAiMessages(prev => [...prev, msg]), []);

  // ── Meeting actions ────────────────────────────────────────
  const addMeeting = useCallback(payload => {
    const id = `mt-${Date.now()}`;
    setMeetings(prev => [...prev, { id, allDay:false, ...payload }]);
    return id;
  }, []);
  const updateMeeting = useCallback((id, upd) => setMeetings(prev => prev.map(m => m.id===id ? {...m,...upd} : m)), []);
  const deleteMeeting = useCallback(id => setMeetings(prev => prev.filter(m => m.id!==id)), []);

  // ── Timeline actions ────────────────────────────────
  const addTimeline = useCallback(payload => {
    const id = `tl-${Date.now()}`;
    const tl = { id, milestones:[], layout:'vertical', isPublic:false, shareEnabled:false, shareToken:null, shareHasPassword:false, shareExpiresAt:null, ...payload };
    setTimelines(prev => [...prev, tl]);
    return id;
  }, []);
  const updateTimeline = useCallback((id, upd) => {
    setTimelines(prev => prev.map(t => t.id===id ? {...t,...upd} : t));
  }, []);
  const deleteTimeline = useCallback(id => setTimelines(prev => prev.filter(t => t.id!==id)), []);
  const addMilestone = useCallback((tlId, m) => {
    const mid = `ms-${Date.now()}`;
    setTimelines(prev => prev.map(t => t.id!==tlId ? t : {...t, milestones:[...t.milestones, {id:mid, status:'upcoming', ...m}]}));
  }, []);
  const updateMilestone = useCallback((tlId, mid, upd) => {
    setTimelines(prev => prev.map(t => t.id!==tlId ? t : {...t, milestones:t.milestones.map(m => m.id===mid ? {...m,...upd} : m)}));
  }, []);
  const deleteMilestone = useCallback((tlId, mid) => {
    setTimelines(prev => prev.map(t => t.id!==tlId ? t : {...t, milestones:t.milestones.filter(m => m.id!==mid)}));
  }, []);

  // ── Workspace actions ─────────────────────────────
  const addWorkspace = useCallback(payload => {
    const id = `ws-${Date.now()}`;
    const ws = { id, role:'owner', memberCount:1+(payload.members?.length||0),
      members:[{userId:'u1', username:'alex_admin', fullName:'Alex Mendez', role:'owner'}, ...(payload.members||[])], ...payload };
    setWorkspaces(prev => [...prev, ws]);
    return id;
  }, []);

  // ── List actions ────────────────────────────────
  const updateList = useCallback((id, upd) => {
    setLists(prev => prev.map(l => l.id===id ? {...l,...upd} : l));
  }, []);
  const addSublist = useCallback((parentTaskId, name) => {
    const id = `sublist-${Date.now()}`;
    const sub = { id, name:name||'Sublist', emoji:'🗂️', subtitle:'Sublist', color:'#5e4dbb', colorBg:'#F5F3FF',
      parentTaskId, depth:1, isPublic:false, sections:[{id:`sec-${Date.now()}`, label:'Checklist', emoji:'✅', tasks:[]}] };
    setLists(prev => [...prev, sub]);
    updateTask(parentTaskId, { linkedListId:id, linkedListType:'sublist' });
    return id;
  }, [updateTask]);

  // Expose nav imperatively for prototyping tools
  useEffect(() => {
    window._sc = { setScreen, setModal, setCurrentListId, setCurrentFolderId };
  }, [setScreen, setModal, setCurrentListId, setCurrentFolderId]);

  const ctx = {
    screen, setScreen, modal, setModal,
    tasks, setTasks, lists, setLists, folders, setFolders,
    files, setFiles, workspaces, currentWorkspaceId, setCurrentWorkspaceId,
    meetings, setMeetings, addMeeting, updateMeeting, deleteMeeting,
    setWorkspaces, addWorkspace,
    timelines, setTimelines, addTimeline, updateTimeline, deleteTimeline,
    addMilestone, updateMilestone, deleteMilestone,
    selectedTimelineId, setSelectedTimelineId,
    updateList, addSublist,
    modalData, setModalData,
    aiMessages, setAiMessages, addAIMessage,
    trash, setTrash,
    currentListId, setCurrentListId,
    currentFolderId, setCurrentFolderId,
    currentPreviewFile, setCurrentPreviewFile,
    selectedTaskId, setSelectedTaskId,
    taskFilter, setTaskFilter,
    profile, setProfile,
    toggleTask, updateTask, deleteTask, addTask, findTaskById,
  };

  return (
    <AppCtx.Provider value={ctx}>
      <window.PhoneFrame>
        <window.AppShell />
      </window.PhoneFrame>
      <window.SideRail />
      <TweaksPanel title="Solytiq iOS">
        <TweakSection label="Color"/>
        <TweakColor label="Palette" value={t.palette}
          options={[
            ['#5e4dbb','#9d8dff','#F5F3FF','#ede9ff','#fdf8ff'],
            ['#2563EB','#60a5fa','#eff6ff','#dbeafe','#f8fbff'],
            ['#059669','#34d399','#ecfdf5','#d1fae5','#f7fdf9'],
            ['#db2777','#f472b6','#fdf2f8','#fce7f3','#fffbfc'],
          ]}
          onChange={v=>setTweak('palette',v)}/>
        <TweakSection label="Shape"/>
        <TweakRadio label="Corner style" value={t.shape}
          options={['sharp','rounded','bubbly']}
          onChange={v=>setTweak('shape',v)}/>
        <TweakSection label="Density"/>
        <TweakRadio label="Spacing" value={t.density}
          options={['compact','regular','airy']}
          onChange={v=>setTweak('density',v)}/>
      </TweaksPanel>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
